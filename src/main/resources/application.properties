spring.application.name=SpringBootJpa-1

# Database Configuration with Secure Environment Fallbacks
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/M_HOSPITAL?createDatabaseIfNotExist=true}
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASS:Annu123.}

# JPA & Hibernate Settings
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Spring Security Configuration with Secure Environment Fallbacks
spring.security.user.name=${SECURITY_USER:user}
spring.security.user.password=${SECURITY_PASS:Annu123.}